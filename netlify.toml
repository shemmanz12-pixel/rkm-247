[build]
  command = "npm run build"
  # FIXED: Point Netlify directly to where your built production assets and 262 pages actually sit!
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20.18.1"

[dev]
  command = "npm run dev"
  port = 5173
  targetPort = 5173

[build.processing]
  skip_processing = false
  [build.processing.html]
    pretty_urls = true

# --- REDIRECTS SECTION ---

# 1. Sitemap Bypass
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

# 2. THE 410 "GONE" CLEANUP
# FIXED: Added explicit "to" fields so Netlify's router parser validates them correctly
[[redirects]]
  from = "/location/*"
  to = "/location/*"
  status = 410

[[redirects]]
  from = "/central-heating/*"
  to = "/central-heating/*"
  status = 410

[[redirects]]
  from = "/blocked-drains/*"
  to = "/blocked-drains/*"
  status = 410

[[redirects]]
  from = "/leak-detection/*"
  to = "/leak-detection/*"
  status = 410

# 3. Force Trailing Slashes (SEO Consistency)
[[redirects]]
  from = "/*"
  to = "/:splat/"
  status = 301
  force = false 
  condition = {path = {notRegex = ".*(\\/|\\..*)$"}}

# 4. Fallback rule for pre-rendered apps
# This guarantees that deep-linking directly into sub-pages maps perfectly to your assets
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false