[build]
  # Single combined build command: build everything (sitemap copied into public by npm build script)
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "18"

[dev]
  command = "npm run dev"
  targetPort = 5173

# Enforce trailing slashes to match the sitemap and prevent redirects
[build.processing]
  [build.processing.html]
    pretty_urls = true
[context.production.processing]
  [context.production.processing.html]
    pretty_urls = true

# Regex redirect: only match /local-plumber/<area>/ when <area> does NOT start with "in-"
[[redirects]]
  from = "^/local-plumber/(?!in-)(.+)/$"
  to = "/local-plumber/in-$1/"
  status = 301
  force = true
  regex = true
