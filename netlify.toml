[build]
  command = "npm run build"
  publish = "dist/netlify-deploy"

[build.environment]
  NODE_VERSION = "20"
[dev]
  command = "npm run dev"
  port = 5173
  targetPort = 5173

[build.processing]
  skip_processing = false
  [build.processing.html]
    pretty_urls = true

# --- REDIRECTS SECTION ---

# 1. Sitemap Bypass
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

# 2. THE 410 "GONE" CLEANUP
[[redirects]]
  from = "/location/*"
  status = 410

[[redirects]]
  from = "/central-heating/*"
  status = 410

[[redirects]]
  from = "/blocked-drains/*"
  status = 410

[[redirects]]
  from = "/leak-detection/*"
  status = 410

# 3. Force Trailing Slashes (SEO Consistency)
[[redirects]]
  from = "/*"
  to = "/:splat/"
  status = 301
  force = false 
  condition = {path = {notRegex = ".*(\\/|\\..*)$"}}

# FIXED: Fallback rule for pre-rendered/multi-page apps
# This checks if an exact match exists (like /local-plumber/ashby-de-la-zouch/index.html) first. 
# It only falls back to the index shell if the folder doesn't exist.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false